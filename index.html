<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Sonic Station</title>
    
    <!-- ENLACE AL MANIFEST -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="theme-color" content="#0d1117">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Barra de Batería Superior */
        .header-status {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .battery-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Logo Central */
        .logo-container {
            margin-top: 20px;
            text-align: center;
        }
        .logo-container img {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin: 30px 0 40px 0;
        }
        .search-bar {
            display: flex;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 20px;
            align-items: center;
        }
        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            padding: 8px;
            outline: none;
            font-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 10px;
            text-decoration: none;
            color: var(--text);
            text-align: center;
            transition: all 0.2s ease-in-out;
        }

        .card:hover {
            transform: translateY(-4px);
            background: #21262d;
            border-color: #8b949e;
        }

        .card i {
            font-size: 32px;
            margin-bottom: 12px;
            display: block;
        }

        .c-yt { color: #FF0000; }
        .c-pi { color: #E60023; }
        .c-re { color: #FF4500; }
        .c-keep { color: #FBBC04; }
        .c-drive { color: #34A853; }
        .c-cal { color: #4285F4; }
        .c-gm { color: #7f5af0; }
        .c-gh { color: #f0f6fc; }

        span { font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>

    <!-- BARRA DE ESTADO SUPERIOR -->
    <div class="header-status">
        <div class="battery-box">
            <i id="batt-icon" class="fas fa-battery-three-quarters"></i>
            <span id="batt-level">--%</span>
        </div>
    </div>

    <!-- LOGO DE LA BRÚJULA -->
    <div class="logo-container">
        <img src="logo.png" alt="Dashboard Logo">
    </div>

    <div class="search-container">
        <form action="https://www.google.com/search" method="GET">
            <div class="search-bar">
                <i class="fas fa-search" style="color: var(--accent);"></i>
                <input type="text" name="q" placeholder="Buscar en Google..." autocomplete="off">
            </div>
        </form>
    </div>

    <div class="grid">
        <a href="https://youtube.com" class="card"><i class="fab fa-youtube c-yt"></i><span>YouTube</span></a>
        <a href="https://reddit.com" class="card"><i class="fab fa-reddit-alien c-re"></i><span>Reddit</span></a>
        <a href="https://pinterest.com" class="card"><i class="fab fa-pinterest c-pi"></i><span>Pinterest</span></a>
        <a href="https://instagram.com" class="card"><i class="fab fa-instagram" style="color: #E1306C;"></i><span>Instagram</span></a>
        <a href="https://keep.google.com" class="card"><i class="fas fa-note-sticky c-keep"></i><span>Google Keep</span></a>
        <a href="https://drive.google.com" class="card"><i class="fab fa-google-drive c-drive"></i><span>Drive</span></a>
        <a href="https://calendar.google.com" class="card"><i class="fas fa-calendar-day c-cal"></i><span>Calendar</span></a>
        <a href="https://mail.google.com" class="card"><i class="fas fa-envelope" style="color: #EA4335;"></i><span>Gmail</span></a>
        <a href="https://gemini.google.com" class="card"><i class="fas fa-wand-magic-sparkles c-gm"></i><span>Gemini</span></a>
        <a href="https://github.com" class="card"><i class="fab fa-github c-gh"></i><span>GitHub</span></a>
        <a href="https://chat.openai.com" class="card"><i class="fas fa-robot" style="color: #10a37f;"></i><span>ChatGPT</span></a>
        <a href="https://web.whatsapp.com" class="card"><i class="fab fa-whatsapp" style="color: #25D366;"></i><span>WhatsApp</span></a>
    </div>

    <script>
        // LÓGICA DE BATERÍA REAL
        function updateBattery() {
            if ('getBattery' in navigator) {
                navigator.getBattery().then(battery => {
                    const levelSpan = document.getElementById('batt-level');
                    const icon = document.getElementById('batt-icon');

                    const refreshBattery = () => {
                        const level = Math.floor(battery.level * 100);
                        levelSpan.innerText = level + "%";
                        
                        // Cambiar icono y color según nivel
                        if(level <= 20) {
                            icon.className = "fas fa-battery-quarter";
                            levelSpan.style.color = "var(--red)";
                        } else if(level >= 80) {
                            icon.className = "fas fa-battery-full";
                            levelSpan.style.color = "var(--green)";
                        } else {
                            icon.className = "fas fa-battery-half";
                            levelSpan.style.color = "var(--text)";
                        }
                    };

                    refreshBattery();
                    battery.addEventListener('levelchange', refreshBattery);
                });
            }
        }

        updateBattery();

        // SCRIPT DE REGISTRO PARA LA APP
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('App lista para instalar'))
                .catch(err => console.log('Error de registro', err));
            });
        }
    </script>
</body>
</html>
